name: Sync fork with upstream

on:
  schedule:
    - cron: '17 6 * * 0'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fast-forward from upstream
        id: sync
        run: |
          set -e
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git remote add upstream "https://github.com/anthropics/skills.git"
          git fetch upstream main
          git checkout main
          BEFORE=$(git rev-parse HEAD)
          git merge --ff-only upstream/main
          AFTER=$(git rev-parse HEAD)
          if [ "$BEFORE" = "$AFTER" ]; then
            echo "updated=false" >> "$GITHUB_OUTPUT"
            echo "No new upstream commits."
          else
            COUNT=$(git rev-list --count $BEFORE..$AFTER)
            echo "updated=true" >> "$GITHUB_OUTPUT"
            echo "count=$COUNT" >> "$GITHUB_OUTPUT"
            git log --format='- %s' $BEFORE..$AFTER | head -10 > /tmp/commits.txt
            git push origin main
            echo "Synced $COUNT new commits."
          fi

      - name: Notify Discord — new updates synced
        if: steps.sync.outputs.updated == 'true'
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          [ -z "$WEBHOOK" ] && exit 0
          COUNT='${{ steps.sync.outputs.count }}'
          COMMITS=$(cat /tmp/commits.txt)
          CONTENT=$(printf '🔄 **%s** synced **%s new commits** from upstream\n```\n%s\n```' "$GITHUB_REPOSITORY" "$COUNT" "$COMMITS")
          jq -nc --arg c "$CONTENT" '{content: $c}' | curl -sS -H "Content-Type: application/json" -X POST "$WEBHOOK" -d @-

      - name: Notify Discord — sync failed
        if: failure()
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          [ -z "$WEBHOOK" ] && exit 0
          URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          CONTENT=$(printf '⚠️ **%s** upstream sync FAILED — likely diverged or upstream unreachable. Run: %s' "$GITHUB_REPOSITORY" "$URL")
          jq -nc --arg c "$CONTENT" '{content: $c}' | curl -sS -H "Content-Type: application/json" -X POST "$WEBHOOK" -d @-
